services:
  alertgate:
    build: .
    image: alertgate:latest
    container_name: alertgate
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - alertgate_media:/app/media
      - alertgate_logs:/app/logs
      # Optional: keep the YOLO model local so first startup does not re-download it.
      # - ./yolo11n.pt:/app/yolo11n.pt:ro
    restart: unless-stopped

volumes:
  alertgate_media:
  alertgate_logs:
